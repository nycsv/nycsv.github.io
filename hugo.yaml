baseURL: "https://eesungkim.com/"
title: "Log"
theme: "PaperMod"
pagination:
  pagerSize: 10

enableRobotsTXT: true

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content/en"
    params:
      homeInfoParams:
        Title: ""
        Content: "Notes of research, experiments, and troubleshooting."
    menu:
      main:
        - identifier: review
          name: "Review"
          url: "/reviews/"
          weight: 25
        - identifier: demo
          name: "Demo"
          url: "/demo/"
          weight: 5
        - identifier: search
          name: "Search"
          url: "/search/"
          weight: 40

params:
  env: production
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: "tags"
  category: "categories"
