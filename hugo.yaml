baseURL: "https://eesungkim.com/"
title: "Log"
theme: "PaperMod"
pagination:
  pagerSize: 10

enableRobotsTXT: true

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 2
    contentDir: "content/en"
    params:
      homeInfoParams:
        Title: "Log"
        Content: "Log of experiments, system design, and troubleshooting. "
    menu:
      main:
        - identifier: demo
          name: "Demo"
          url: "/demo/"
          weight: 5
        - identifier: posts
          name: "Posts"
          url: "/posts/"
          weight: 10
        - identifier: review
          name: "Review"
          url: "/review/"
          weight: 25
        - identifier: about
          name: "About"
          url: "/about/"
          weight: 30
        - identifier: search
          name: "Search"
          url: "/search/"
          weight: 40

  ko:
    languageName: "한국어"
    weight: 1
    contentDir: "content/ko"
    params:
      homeInfoParams:
        Title: "개발 일지"
        Content: "실험, 시스템 설계, 트러블슈팅을 기록합니다."
    menu:
      main:
        - identifier: posts
          name: "글"
          url: "/ko/posts/"
          weight: 10
        - identifier: review
          name: "리뷰"
          url: "/ko/review/"
          weight: 25
        - identifier: about
          name: "소개"
          url: "/ko/about/"
          weight: 30
        - identifier: search
          name: "검색"
          url: "/ko/search/"
          weight: 40

params:
  env: production
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: "tags"
  category: "categories"
