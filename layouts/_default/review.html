{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    {{ $posts := where .Site.RegularPages "Section" "reviews" }}
    {{ if gt (len $posts) 0 }}
    <ul>
      {{ range $posts.ByDate.Reverse }}
      <li><a href="{{ .RelPermalink }}">{{ .File.BaseFileName }}</a></li>
      {{ end }}
    </ul>
    {{ else }}
    <p>No review items yet.</p>
    {{ end }}

    {{ .Content }}
  </div>
</article>
{{ end }}
